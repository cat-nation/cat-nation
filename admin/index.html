<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Admin Console</title>
    <!-- Loads from an alternate secure network -->
    <script src="https://unpkg.com@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // Injects config settings cleanly into your webpage layout
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'cat-nation/cat-nation', // <-- EXPLICITLY TYPE YOUR GITHUB USERNAME/REPOSITORY NAME
            branch: 'main' // <-- Switch to 'master' if your repo branch name is master
          },
          media_folder: 'images',
          public_folder: '/images',
          collections: [
            {
              name: 'citizens',
              label: 'Citizen List',
              folder: 'citizens',
              create: true,
              fields: [
                { label: 'Citizen Name', name: 'title', widget: 'string' },
                { label: 'Role/Title', name: 'body', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
