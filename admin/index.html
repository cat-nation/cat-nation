<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Admin Console</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'cat-nation/cat-nation',
            branch: 'main'
          },
          media_folder: 'images',
          public_folder: '/images',
          collections: [
            {
              name: 'citizens',
              label: 'Citizen List',
              folder: 'citizens',
              create: true,
              fields: [
                { label: 'Citizen Name', name: 'title', widget: 'string' },
                { label: 'Role/Title', name: 'body', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
