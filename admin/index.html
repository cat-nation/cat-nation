<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Nation Admin</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: #111; }
    .wrap { max-width: 620px; margin: 0 auto; padding: 20px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-top: 4px; }
    label { font-size: 13px; color: #555; display: block; margin-top: 12px; }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
    .btn-dark { background: #111; color: #fff; width: 100%; margin-top: 14px; }
    .btn-dark:hover { background: #333; }
    .btn-sm { padding: 4px 10px; font-size: 12px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; }
    .btn-danger { border-color: #fca5a5; color: #dc2626; }
    .btn-accent { border-color: #93c5fd; color: #1d4ed8; }
    .card { border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; background: #fff; margin-bottom: 12px; }
    .citizen-row { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: #e0e7ff; color: #4f46e5; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #555; }
    .tab.active { background: #111; color: #fff; border-color: #111; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .badge { font-size: 11px; background: #dcfce7; color: #166534; padding: 3px 10px; border-radius: 999px; }
    .id-badge { font-size: 11px; background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 6px; font-weight: 600; font-family: monospace; }
    .error { color: red; font-size: 13px; margin-top: 4px; display: none; }
    .screen { display: none; }
    .screen.active { display: block; }
    .vote-bar { background: #e0e7ff; border-radius: 999px; height: 8px; margin-top: 4px; }
    .vote-fill { background: #4f46e5; border-radius: 999px; height: 8px; transition: width 0.3s; }
    .election-banner { background: #fefce8; border: 1px solid #fde68a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .winner-banner { background: #f0fdf4; border: 1px solid #86efac; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    textarea { height: 90px; resize: vertical; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .id-row { display: flex; gap: 8px; align-items: flex-end; }
    .id-prefix { background: #f3f4f6; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; color: #555; white-space: nowrap; margin-top: 4px; }
    .id-row input { flex: 1; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active wrap" style="max-width:400px;margin-top:80px;">
  <h1 style="text-align:center;">🐱 Cat Nation Admin</h1>
  <div class="card">
    <label>Username</label>
    <input id="login-user" type="text" placeholder="admin" />
    <label>Password</label>
    <input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <div id="login-error" class="error">Incorrect username or password.</div>
    <button class="btn btn-dark" onclick="doLogin()">Log in</button>
  </div>
</div>

<!-- MAIN ADMIN -->
<div id="main-screen" class="screen wrap">
  <div class="topbar">
    <div>
      <h2 style="margin:0;">🐱 Cat Nation <span id="citizen-count" class="badge">0 citizens</span></h2>
    </div>
    <button class="btn-sm" onclick="logout()">Log out</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('citizens')">Citizens</button>
    <button class="tab" onclick="showTab('add')">Add citizen</button>
    <button class="tab" onclick="showTab('election')">Election</button>
  </div>

  <!-- CITIZENS LIST -->
  <div id="tab-citizens">
    <div id="citizen-list"><p style="color:#999;text-align:center;">No citizens yet.</p></div>
  </div>

  <!-- ADD CITIZEN -->
  <div id="tab-add" style="display:none;">
    <div class="card">
      <label>Photo</label>
      <img id="add-photo-preview" style="display:none;width:60px;height:60px;border-radius:50%;object-fit:cover;margin-top:8px;" />
      <input type="file" id="add-photo" accept="image/*" onchange="previewPhoto('add-photo','add-photo-preview')" />
      <label>National ID number</label>
      <div class="id-row">
        <span class="id-prefix">CN-</span>
        <input id="add-id" type="text" placeholder="auto" />
      </div>
      <small style="color:#999;font-size:11px;margin-top:4px;display:block;">Leave blank to auto-assign</small>
      <label>Citizen name</label>
      <input id="add-name" type="text" placeholder="e.g. Whiskers McGee" />
      <label>Role</label>
      <select id="add-role">
        <option>Citizen</option>
        <option>Ambassador</option>
        <option>Cabinet Minister</option>
        <option>Noble</option>
      </select>
      <label>Biography</label>
      <textarea id="add-bio" placeholder="Enter biography and records..."></textarea>
      <button class="btn btn-dark" onclick="addCitizen()">Add citizen</button>
    </div>
  </div>

  <!-- ELECTION TAB -->
  <div id="tab-election" style="display:none;">
    <div id="election-area"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3 style="margin-top:0;">Edit citizen</h3>
    <input type="hidden" id="edit-id-hidden" />
    <label>Photo</label>
    <img id="edit-photo-preview" style="display:none;width:60px;height:60px;border-radius:50%;object-fit:cover;margin-top:8px;" />
    <input type="file" id="edit-photo" accept="image/*" onchange="previewPhoto('edit-photo','edit-photo-preview')" />
    <label>National ID number</label>
    <div class="id-row">
      <span class="id-prefix">CN-</span>
      <input id="edit-cn-id" type="text" placeholder="e.g. 001" />
    </div>
    <label>Citizen name</label>
    <input id="edit-name" type="text" />
    <label>Role</label>
    <select id="edit-role">
      <option>Citizen</option>
      <option>Ambassador</option>
      <option>Cabinet Minister</option>
      <option>Noble</option>
    </select>
    <label>Biography</label>
    <textarea id="edit-bio"></textarea>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-dark" style="flex:1;" onclick="saveEdit()">Save changes</button>
      <button class="btn-sm" style="padding:10px 16px;" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<!-- VOTE MODAL -->
<div class="modal-bg" id="vote-modal">
  <div class="modal">
    <h3 style="margin-top:0;">Cast your vote</h3>
    <p style="font-size:14px;color:#555;">You are voting for: <strong id="vote-for-name"></strong></p>
    <label>Your citizen name (must match registry exactly)</label>
    <input id="voter-name-input" type="text" placeholder="Enter your exact citizen name" />
    <div id="vote-error" class="error"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-dark" style="flex:1;" onclick="submitVote()">Submit vote</button>
      <button class="btn-sm" style="padding:10px 16px;" onclick="closeVoteModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'setionmanA3';
const USERNAME = 'admin';

let citizens = JSON.parse(localStorage.getItem('cn-citizens') || '[]');
let election = JSON.parse(localStorage.getItem('cn-election') || 'null');
let editPhotoData = null;
let addPhotoData = null;
let votingForId = null;

function save() {
  localStorage.setItem('cn-citizens', JSON.stringify(citizens));
  localStorage.setItem('cn-election', JSON.stringify(election));
}

function nextId() {
  const used = citizens.map(c => parseInt((c.cnId || '').replace(/\D/g,'')));
  let n = 1;
  while (used.includes(n)) n++;
  return String(n).padStart(3, '0');
}

function formatId(raw) {
  const n = parseInt(raw.replace(/\D/g,''));
  if (isNaN(n)) return null;
  return String(n).padStart(3, '0');
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (u === USERNAME && p === PASSWORD) {
    document.getElementById('login-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    renderAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

function showTab(tab) {
  ['citizens','add','election'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['citizens','add','election'][i] === tab);
  });
  if (tab === 'election') renderElection();
}

function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    if (inputId === 'add-photo') addPhotoData = e.target.result;
    if (inputId === 'edit-photo') editPhotoData = e.target.result;
    const img = document.getElementById(previewId);
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function addCitizen() {
  const name = document.getElementById('add-name').value.trim();
  const role = document.getElementById('add-role').value;
  const bio = document.getElementById('add-bio').value.trim();
  const rawId = document.getElementById('add-id').value.trim();
  if (!name) { alert('Please enter a citizen name.'); return; }
  const cnId = rawId ? formatId(rawId) : nextId();
  if (!cnId) { alert('Invalid ID number.'); return; }
  if (citizens.find(c => c.cnId === cnId)) { alert('ID CN-' + cnId + ' is already taken. Please choose another.'); return; }
  citizens.push({ name, role, bio, photo: addPhotoData, cnId, id: Date.now() });
  save();
  document.getElementById('add-name').value = '';
  document.getElementById('add-bio').value = '';
  document.getElementById('add-role').selectedIndex = 0;
  document.getElementById('add-photo').value = '';
  document.getElementById('add-photo-preview').style.display = 'none';
  document.getElementById('add-id').value = '';
  addPhotoData = null;
  renderAll();
  showTab('citizens');
}

function deleteCitizen(id) {
  if (!confirm('Remove this citizen?')) return;
  citizens = citizens.filter(c => c.id !== id);
  save();
  renderAll();
}

function openEdit(id) {
  const c = citizens.find(c => c.id === id);
  if (!c) return;
  document.getElementById('edit-id-hidden').value = id;
  document.getElementById('edit-cn-id').value = c.cnId || '';
  document.getElementById('edit-name').value = c.name;
  document.getElementById('edit-role').value = c.role;
  document.getElementById('edit-bio').value = c.bio || '';
  editPhotoData = c.photo || null;
  const prev = document.getElementById('edit-photo-preview');
  if (c.photo) { prev.src = c.photo; prev.style.display = 'block'; }
  else prev.style.display = 'none';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  editPhotoData = null;
}

function saveEdit() {
  const id = parseInt(document.getElementById('edit-id-hidden').value);
  const name = document.getElementById('edit-name').value.trim();
  const role = document.getElementById('edit-role').value;
  const bio = document.getElementById('edit-bio').value.trim();
  const rawId = document.getElementById('edit-cn-id').value.trim();
  if (!name) { alert('Name cannot be empty.'); return; }
  const cnId = rawId ? formatId(rawId) : nextId();
  if (!cnId) { alert('Invalid ID number.'); return; }
  const conflict = citizens.find(c => c.cnId === cnId && c.id !== id);
  if (conflict) { alert('ID CN-' + cnId + ' is already taken by ' + conflict.name + '.'); return; }
  const c = citizens.find(c => c.id === id);
  if (c) {
    c.name = name; c.role = role; c.bio = bio; c.cnId = cnId;
    if (editPhotoData) c.photo = editPhotoData;
  }
  save();
  closeEdit();
  renderAll();
}

function renderAll() {
  const list = document.getElementById('citizen-list');
  const count = document.getElementById('citizen-count');
  count.textContent = citizens.length + (citizens.length === 1 ? ' citizen' : ' citizens');
  if (citizens.length === 0) {
    list.innerHTML = '<p style="color:#999;text-align:center;">No citizens yet.</p>';
    return;
  }
  const sorted = [...citizens].sort((a,b) => (a.cnId||'').localeCompare(b.cnId||''));
  list.innerHTML = sorted.map(c => `
    <div class="card citizen-row">
      ${c.photo ? `<img src="${c.photo}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;" />` : `<div class="avatar">${initials(c.name)}</div>`}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-weight:600;">${c.name}</span>
          ${c.cnId ? `<span class="id-badge">CN-${c.cnId}</span>` : ''}
        </div>
        <div style="font-size:12px;color:#666;">${c.role}</div>
        ${c.bio ? `<div style="font-size:12px;color:#999;margin-top:2px;">${c.bio.slice(0,70)}${c.bio.length>70?'…':''}</div>` : ''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn-sm btn-accent" onclick="openEdit(${c.id})">Edit</button>
        <button class="btn-sm btn-danger" onclick="deleteCitizen(${c.id})">Remove</button>
      </div>
    </div>
  `).join('');
}

function renderElection() {
  const area = document.getElementById('election-area');
  if (!election) {
    area.innerHTML = `
      <div class="card" style="text-align:center;">
        <p style="color:#555;">No election is currently running.</p>
        <button class="btn btn-dark" style="width:auto;padding:10px 24px;" onclick="startElection()">Start election</button>
      </div>`;
    return;
  }
  const totalVotes = Object.values(election.votes).reduce((a,b) => a + b.count, 0);
  const winner = election.ended ? [...citizens].sort((a,b) => {
    const av = election.votes[a.id] ? election.votes[a.id].count : 0;
    const bv = election.votes[b.id] ? election.votes[b.id].count : 0;
    return bv - av;
  })[0] : null;

  area.innerHTML = `
    ${election.ended
      ? `<div class="winner-banner">🏆 Election ended! Winner: <strong>${winner ? winner.name : 'No votes cast'}</strong>${winner && winner.cnId ? ` <span class="id-badge">CN-${winner.cnId}</span>` : ''}</div>`
      : `<div class="election-banner">🗳️ Election is live! Citizens can now vote.</div>`}
    ${citizens.map(c => {
      const v = election.votes[c.id] || { count: 0 };
      const pct = totalVotes > 0 ? Math.round(v.count / totalVotes * 100) : 0;
      return `
        <div class="card">
          <div class="citizen-row">
            ${c.photo ? `<img src="${c.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" />` : `<div class="avatar">${initials(c.name)}</div>`}
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="font-weight:600;">${c.name}</span>
                ${c.cnId ? `<span class="id-badge">CN-${c.cnId}</span>` : ''}
              </div>
              <div style="font-size:12px;color:#666;">${c.role}</div>
              <div class="vote-bar"><div class="vote-fill" style="width:${pct}%"></div></div>
              <div style="font-size:12px;color:#555;margin-top:2px;">${v.count} vote${v.count !== 1 ? 's' : ''} (${pct}%)</div>
            </div>
            ${!election.ended ? `<button class="btn-sm btn-accent" onclick="openVoteModal(${c.id},'${c.name.replace(/'/g,"\\'")}')">Vote</button>` : ''}
          </div>
        </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:8px;">
      ${!election.ended ? `<button class="btn-sm btn-danger" onclick="endElection()">End election</button>` : ''}
      <button class="btn-sm" onclick="resetElection()">Clear & start new election</button>
    </div>`;
}

function startElection() {
  if (citizens.length < 2) { alert('You need at least 2 citizens to start an election.'); return; }
  election = { votes: {}, voters: [], ended: false };
  save();
  renderElection();
}

function endElection() {
  if (!confirm('End the election now?')) return;
  election.ended = true;
  save();
  renderElection();
}

function resetElection() {
  if (!confirm('Clear all votes and start a new election?')) return;
  election = null;
  save();
  renderElection();
}

function openVoteModal(id, name) {
  votingForId = id;
  document.getElementById('vote-for-name').textContent = name;
  document.getElementById('voter-name-input').value = '';
  document.getElementById('vote-error').style.display = 'none';
  document.getElementById('vote-modal').classList.add('open');
}

function closeVoteModal() {
  document.getElementById('vote-modal').classList.remove('open');
  votingForId = null;
}

function submitVote() {
  const voterName = document.getElementById('voter-name-input').value.trim().toLowerCase();
  const errEl = document.getElementById('vote-error');
  const match = citizens.find(c => c.name.toLowerCase() === voterName);
  if (!match) {
    errEl.textContent = 'That name is not in the citizen registry.';
    errEl.style.display = 'block';
    return;
  }
  if (election.voters.includes(match.id)) {
    errEl.textContent = 'This citizen has already voted.';
    errEl.style.display = 'block';
    return;
  }
  if (!election.votes[votingForId]) election.votes[votingForId] = { count: 0 };
  election.votes[votingForId].count++;
  election.voters.push(match.id);
  save();
  closeVoteModal();
  renderElection();
}

renderAll();
</script>
</body>
</html>
