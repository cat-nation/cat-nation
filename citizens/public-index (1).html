<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Nation — Citizen Directory</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: #111; }
    header { background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 100%); color: #fff; padding: 32px 20px; text-align: center; }
    header h1 { margin: 0 0 6px; font-size: 28px; }
    header p { margin: 0; opacity: 0.75; font-size: 14px; }
    nav { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .nav-btn { padding: 7px 18px; border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.4); background: transparent; color: #fff; cursor: pointer; font-size: 13px; }
    .nav-btn.active { background: #fff; color: #1e1b4b; border-color: #fff; font-weight: 600; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
    .search-bar { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 20px; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 100px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: #3730a3; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; background: #e0e7ff; color: #4f46e5; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; flex-shrink: 0; }
    .id-badge { font-size: 11px; background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 6px; font-weight: 600; font-family: monospace; }
    .role-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
    .role-Noble { background: #fef9c3; color: #854d0e; }
    .role-Ambassador { background: #dcfce7; color: #166534; }
    .role-Cabinet { background: #fee2e2; color: #991b1b; }
    .role-Citizen { background: #f1f5f9; color: #475569; }
    .empty { text-align: center; color: #999; padding: 40px 0; font-size: 15px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; border-radius: 999px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; color: #555; }
    .filter-btn.active { background: #1e1b4b; color: #fff; border-color: #1e1b4b; }
    footer { text-align: center; color: #bbb; font-size: 12px; padding: 32px 0 16px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ELECTION */
    .election-banner { background: #fefce8; border: 1px solid #fde68a; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .winner-banner { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1px solid #86efac; border-radius: 12px; padding: 24px; margin-bottom: 20px; text-align: center; }
    .winner-banner h2 { margin: 8px 0 4px; font-size: 22px; }
    .no-election { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 40px 20px; text-align: center; color: #999; }
    .vote-bar-wrap { background: #e0e7ff; border-radius: 999px; height: 10px; margin-top: 6px; }
    .vote-fill { background: #4f46e5; border-radius: 999px; height: 10px; transition: width 0.5s; }
    .candidate-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .candidate-row { display: flex; align-items: center; gap: 14px; }
    .btn-vote { padding: 8px 18px; background: #3730a3; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
    .btn-vote:hover { background: #1e1b4b; }
    .btn-voted { padding: 8px 18px; background: #dcfce7; color: #166534; border: 1px solid #86efac; border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: default; }

    /* VOTE MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 28px; width: 90%; max-width: 420px; }
    .modal h3 { margin-top: 0; }
    .modal input { width: 100%; box-sizing: border-box; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-top: 6px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
    .btn-dark { background: #1e1b4b; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; flex: 1; }
    .btn-dark:hover { background: #3730a3; }
    .btn-cancel { padding: 10px 16px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .vote-error { color: red; font-size: 13px; margin-top: 6px; display: none; }
  </style>
</head>
<body>

<header>
  <div style="font-size:36px;margin-bottom:8px;">🐱</div>
  <h1>Cat Nation</h1>
  <p>Official Citizen Directory</p>
  <nav>
    <button class="nav-btn active" onclick="showPage('citizens')">Citizens</button>
    <button class="nav-btn" onclick="showPage('election')">Election</button>
  </nav>
</header>

<!-- CITIZENS PAGE -->
<div class="page active" id="page-citizens">
  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total citizens</div></div>
      <div class="stat"><div class="stat-num" id="stat-nobles">0</div><div class="stat-label">Nobles</div></div>
      <div class="stat"><div class="stat-num" id="stat-ambassadors">0</div><div class="stat-label">Ambassadors</div></div>
      <div class="stat"><div class="stat-num" id="stat-ministers">0</div><div class="stat-label">Ministers</div></div>
    </div>
    <input class="search-bar" id="search" type="text" placeholder="🔍 Search citizens..." oninput="renderCitizens()" />
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('All')">All</button>
      <button class="filter-btn" onclick="setFilter('Noble')">Nobles</button>
      <button class="filter-btn" onclick="setFilter('Ambassador')">Ambassadors</button>
      <button class="filter-btn" onclick="setFilter('Cabinet Minister')">Ministers</button>
      <button class="filter-btn" onclick="setFilter('Citizen')">Citizens</button>
    </div>
    <div id="citizen-list"></div>
  </div>
</div>

<!-- ELECTION PAGE -->
<div class="page" id="page-election">
  <div class="wrap">
    <div id="election-area"></div>
  </div>
</div>

<footer>Cat Nation &copy; Official Government Directory</footer>

<!-- VOTE MODAL -->
<div class="modal-bg" id="vote-modal">
  <div class="modal">
    <h3>🗳️ Cast your vote</h3>
    <p style="font-size:14px;color:#555;margin-top:0;">Voting for: <strong id="vote-for-name"></strong></p>
    <label style="font-size:13px;color:#555;">Your National ID <span style="color:#999;">(e.g. CN-001)</span></label>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
      <span style="background:#f3f4f6;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;white-space:nowrap;">CN-</span>
      <input id="voter-id-input" type="text" placeholder="001" style="margin-top:0;" />
    </div>
    <div class="vote-error" id="vote-error"></div>
    <div class="modal-btns">
      <button class="btn-dark" onclick="submitVote()">Submit vote</button>
      <button class="btn-cancel" onclick="closeVoteModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let citizens = [];
  let election = null;
  let activeFilter = 'All';
  let votingForId = null;

  try { citizens = JSON.parse(localStorage.getItem('cn-citizens') || '[]'); } catch(e) {}
  try { election = JSON.parse(localStorage.getItem('cn-election') || 'null'); } catch(e) {}

  function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['citizens','election'][i] === p));
    if (p === 'election') renderElection();
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function roleClass(role) {
    if (role === 'Noble') return 'role-Noble';
    if (role === 'Ambassador') return 'role-Ambassador';
    if (role === 'Cabinet Minister') return 'role-Cabinet';
    return 'role-Citizen';
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === f));
    renderCitizens();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = citizens.length;
    document.getElementById('stat-nobles').textContent = citizens.filter(c => c.role === 'Noble').length;
    document.getElementById('stat-ambassadors').textContent = citizens.filter(c => c.role === 'Ambassador').length;
    document.getElementById('stat-ministers').textContent = citizens.filter(c => c.role === 'Cabinet Minister').length;
  }

  function renderCitizens() {
    const query = document.getElementById('search').value.toLowerCase();
    let list = [...citizens].sort((a,b) => (a.cnId||'').localeCompare(b.cnId||''));
    if (activeFilter !== 'All') list = list.filter(c => c.role === activeFilter);
    if (query) list = list.filter(c =>
      c.name.toLowerCase().includes(query) ||
      c.role.toLowerCase().includes(query) ||
      (c.cnId && ('cn-' + c.cnId).includes(query))
    );
    const el = document.getElementById('citizen-list');
    if (list.length === 0) { el.innerHTML = '<div class="empty">No citizens found.</div>'; return; }
    el.innerHTML = list.map(c => `
      <div class="card">
        ${c.photo ? `<img src="${c.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;" />` : `<div class="avatar">${initials(c.name)}</div>`}
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;">
            <span style="font-weight:600;font-size:15px;">${c.name}</span>
            ${c.cnId ? `<span class="id-badge">CN-${c.cnId}</span>` : ''}
            <span class="role-badge ${roleClass(c.role)}">${c.role}</span>
          </div>
          ${c.bio ? `<div style="font-size:13px;color:#666;">${c.bio.slice(0,100)}${c.bio.length>100?'…':''}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderElection() {
    // Refresh data in case admin changed it
    try { election = JSON.parse(localStorage.getItem('cn-election') || 'null'); } catch(e) {}
    try { citizens = JSON.parse(localStorage.getItem('cn-citizens') || '[]'); } catch(e) {}

    const area = document.getElementById('election-area');
    if (!election) {
      area.innerHTML = '<div class="no-election"><div style="font-size:36px;margin-bottom:10px;">🗳️</div><p>No election is currently running.</p><p style="font-size:13px;">Check back later!</p></div>';
      return;
    }

    const nobles = citizens.filter(c => election.candidateIds ? election.candidateIds.includes(c.id) : c.role === 'Noble');
    const totalVotes = Object.values(election.votes).reduce((a,b) => a + b.count, 0);
    const myVotes = JSON.parse(localStorage.getItem('cn-my-votes') || '[]');

    let winnerHTML = '';
    if (election.ended) {
      const winner = [...nobles].sort((a,b) => {
        const av = election.votes[a.id] ? election.votes[a.id].count : 0;
        const bv = election.votes[b.id] ? election.votes[b.id].count : 0;
        return bv - av;
      })[0];
      winnerHTML = `
        <div class="winner-banner">
          <div style="font-size:40px;">🏆</div>
          <h2>${winner ? winner.name : 'No votes cast'}</h2>
          ${winner && winner.cnId ? `<span class="id-badge">CN-${winner.cnId}</span>` : ''}
          <p style="color:#166534;font-size:14px;margin:8px 0 0;">Elected leader of Cat Nation</p>
        </div>`;
    } else {
      winnerHTML = `<div class="election-banner">🗳️ <strong>Election is live!</strong> Cast your vote below.</div>`;
    }

    area.innerHTML = winnerHTML + nobles.map(c => {
      const v = election.votes[c.id] || { count: 0 };
      const pct = totalVotes > 0 ? Math.round(v.count / totalVotes * 100) : 0;
      const alreadyVoted = myVotes.includes(c.id) || election.voters.some(vid => myVotes.includes(vid));
      const hasVotedAnywhere = election.voters.some(vid => {
        const voter = citizens.find(cx => cx.id === vid);
        return voter && myVotes.includes(voter.id);
      });
      return `
        <div class="candidate-card">
          <div class="candidate-row">
            ${c.photo ? `<img src="${c.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;" />` : `<div class="avatar" style="width:52px;height:52px;">${initials(c.name)}</div>`}
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="font-weight:600;font-size:15px;">${c.name}</span>
                ${c.cnId ? `<span class="id-badge">CN-${c.cnId}</span>` : ''}
                <span class="role-badge role-Noble">Noble</span>
              </div>
              ${c.bio ? `<div style="font-size:13px;color:#777;margin-top:2px;">${c.bio.slice(0,80)}${c.bio.length>80?'…':''}</div>` : ''}
              <div class="vote-bar-wrap"><div class="vote-fill" style="width:${pct}%"></div></div>
              <div style="font-size:12px;color:#555;margin-top:4px;">${v.count} vote${v.count!==1?'s':''} · ${pct}%</div>
            </div>
            ${!election.ended
              ? (hasVotedAnywhere
                  ? `<span class="btn-voted">✓ Voted</span>`
                  : `<button class="btn-vote" onclick="openVoteModal(${c.id},'${c.name.replace(/'/g,"\\'")}')">Vote</button>`)
              : ''}
          </div>
        </div>`;
    }).join('');
  }

  function openVoteModal(id, name) {
    votingForId = id;
    document.getElementById('vote-for-name').textContent = name;
    document.getElementById('voter-name-input').value = '';
    document.getElementById('vote-error').style.display = 'none';
    document.getElementById('vote-modal').classList.add('open');
  }

  function closeVoteModal() {
    document.getElementById('vote-modal').classList.remove('open');
    votingForId = null;
  }

  function submitVote() {
    const rawId = document.getElementById('voter-id-input').value.trim().replace(/\D/g, '');
    const errEl = document.getElementById('vote-error');
    if (!rawId) {
      errEl.textContent = 'Please enter your CN ID number.';
      errEl.style.display = 'block';
      return;
    }
    const cnId = String(parseInt(rawId)).padStart(3, '0');
    const match = citizens.find(c => c.cnId === cnId);
    if (!match) {
      errEl.textContent = 'No citizen found with ID CN-' + cnId + '.';
      errEl.style.display = 'block';
      return;
    }
    if (election.voters.includes(match.id)) {
      errEl.textContent = 'CN-' + cnId + ' has already voted.';
      errEl.style.display = 'block';
      return;
    }
    if (!election.votes[votingForId]) election.votes[votingForId] = { count: 0 };
    election.votes[votingForId].count++;
    election.voters.push(match.id);
    localStorage.setItem('cn-election', JSON.stringify(election));

    // Track locally so this device shows "Voted"
    const myVotes = JSON.parse(localStorage.getItem('cn-my-votes') || '[]');
    myVotes.push(match.id);
    localStorage.setItem('cn-my-votes', JSON.stringify(myVotes));

    closeVoteModal();
    renderElection();
  }

  updateStats();
  renderCitizens();
</script>
</body>
</html>
